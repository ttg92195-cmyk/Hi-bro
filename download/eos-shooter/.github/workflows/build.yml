# ============================================================================
# EOS Shooter - GitHub Actions CI/CD
# Builds Android APK and Desktop binaries automatically.
# ============================================================================

name: Build & Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  NDK_VERSION: '25.2.9519653'
  CMAKE_VERSION: '3.22.1'

jobs:
  # ============================================================================
  # Job 1: Build Android APK (using CMake + NDK directly)
  # ============================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Clone Raylib for Android
        run: |
          mkdir -p third_party
          if [ ! -d "third_party/raylib" ]; then
            git clone --depth 1 https://github.com/raysan5/raylib.git third_party/raylib
          fi

      - name: Verify EOS SDK
        run: |
          echo "EOS SDK path: third_party/eos-sdk"
          if [ -f "third_party/eos-sdk/Include/eos_sdk.h" ]; then
            echo "EOS SDK found - building with multiplayer support"
            echo "Android arm64-v8a .so: $(ls -la third_party/eos-sdk/Lib/Android/arm64-v8a/libEOSSDK.so 2>/dev/null || echo 'not found')"
          else
            echo "EOS SDK not found - building in dev mode (no multiplayer)"
          fi

      - name: Build with CMake + NDK (arm64-v8a)
        run: |
          mkdir -p build-android
          cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DPLATFORM_ANDROID=ON \
            -DANDROID_STL=c++_shared
          cmake --build . --config ${{ env.BUILD_TYPE }} -- -j$(nproc)

      - name: Prepare APK output
        run: |
          mkdir -p dist/android
          cp build-android/libeos-shooter.so dist/android/ 2>/dev/null || true
          # Copy EOS SDK .so if exists
          cp third_party/eos-sdk/Lib/Android/arm64-v8a/libEOSSDK.so dist/android/ 2>/dev/null || true
          echo "Build output:"
          ls -la dist/android/ 2>/dev/null || echo "No output files"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: eos-shooter-android
          path: dist/android/
          retention-days: 30

  # ============================================================================
  # Job 2: Build Desktop (Windows, Linux, macOS)
  # ============================================================================
  build-desktop:
    name: Build ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            cmake_args: ''
            artifact: eos-shooter-linux
          - name: Windows
            os: windows-latest
            cmake_args: '-G "MinGW Makefiles"'
            artifact: eos-shooter-windows
          - name: macOS
            os: macos-latest
            cmake_args: ''
            artifact: eos-shooter-macos

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxrandr-dev \
            libxi-dev libgl1-mesa-dev libglu1-mesa-dev \
            libxcursor-dev libxinerama-dev libwayland-dev \
            libxkbcommon-dev cmake build-essential

      - name: Clone Raylib
        run: |
          mkdir -p third_party
          if [ ! -d "third_party/raylib" ]; then
            git clone --depth 1 https://github.com/raysan5/raylib.git third_party/raylib
          fi
        shell: bash

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ${{ matrix.platform.cmake_args }}
        shell: bash

      - name: Build
        run: |
          cd build
          cmake --build . --config ${{ env.BUILD_TYPE }} -- -j$(nproc 2>/dev/null || echo 2)
        shell: bash

      - name: Package artifact
        run: |
          mkdir -p dist
          cp build/eos-shooter${{ runner.os == 'Windows' && '.exe' || '' }} dist/ || true
          # Copy EOS SDK shared lib if exists
          cp build/libEOSSDK.so dist/ 2>/dev/null || true
          cp build/libEOSSDK.dylib dist/ 2>/dev/null || true
          cp build/EOSSDK.dll dist/ 2>/dev/null || true
          cp -r assets dist/assets 2>/dev/null || true
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: dist/
          retention-days: 30

  # ============================================================================
  # Job 3: Release (only on version tags)
  # ============================================================================
  release:
    name: Create Release
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: EOS Shooter ${{ github.ref_name }}
          body: |
            ## EOS Shooter - Multiplayer FPS

            ### Features
            - C++ Shooting Game with Raylib
            - Epic Online Services (EOS) - Free Multiplayer
            - Real-time P2P Networking
            - Voice Chat Support
            - Android + Desktop builds

            ### Installation (Android)
            1. Download the Android artifact
            2. The .so files can be used in an Android Studio project
            3. Build APK from Android Studio

            ### Build from Source
            ```bash
            git clone https://github.com/ttg92195-cmyk/Hi-bro.git
            cd Hi-bro
            mkdir build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=Release
            cmake --build . -j$(nproc)
            ```
          draft: false
          prerelease: false
          files: |
            artifacts/eos-shooter-android/*
            artifacts/eos-shooter-linux/*
            artifacts/eos-shooter-windows/*
            artifacts/eos-shooter-macos/*
